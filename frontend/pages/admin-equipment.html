<!DOCTYPE html>

<html>

<head>

<title>Equipment Control Panel</title>

<style>

body{
background:#071226;
color:white;
font-family:Arial;
text-align:center;
}

.container{
width:70%;
margin:auto;
margin-top:50px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:12px;
border-bottom:1px solid #444;
}

button{
padding:6px 12px;
margin:2px;
border:none;
border-radius:4px;
cursor:pointer;
}

.edit{
background:#ccc;
}

.delete{
background:#e74c3c;
color:white;
}

.add{
background:#2ecc71;
color:white;
margin-top:20px;
}

input{
padding:6px;
margin:5px;
}

</style>

</head>

<body>

<h1>Equipment Control Panel</h1>

<div class="container">

<button class="add" onclick="showAddForm()">Add Equipment</button>

<table>

<thead>

<tr>
<th>ID</th>
<th>Equipment</th>
<th>Image</th>
<th>Action</th>
</tr>

</thead>

<tbody id="equipmentTable"></tbody>

</table>

</div>

<script>

/* LOAD EQUIPMENT */

async function loadEquipment(){

try{

const response = await fetch("http://localhost:3000/equipment");

const equipment = await response.json();

const table = document.getElementById("equipmentTable");

table.innerHTML="";

if(equipment.length===0){

table.innerHTML="<tr><td colspan='4'>No equipment found</td></tr>";
return;

}

equipment.forEach(e=>{

const row = document.createElement("tr");

row.innerHTML=`

<td>${e.equipment_id}</td>

<td>${e.equipment_name}</td>

<td>${e.image}</td>

<td>
<button class="edit" onclick="editEquipment(${e.equipment_id},'${e.equipment_name}','${e.image}')">Edit</button>
<button class="delete" onclick="deleteEquipment(${e.equipment_id})">Delete</button>
</td>

`;

table.appendChild(row);

});

}catch(err){

console.error(err);
alert("Error loading equipment");

}

}


/* ADD EQUIPMENT */

function showAddForm(){

const name = prompt("Equipment Name:");

const image = prompt("Image file name (example: grenade.png)");

if(!name) return;

fetch("http://localhost:3000/equipment/add",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
equipment_name:name,
image:image
})

})
.then(()=>loadEquipment());

}


/* EDIT EQUIPMENT */

function editEquipment(id,name,image){

const newName = prompt("Edit name:",name);

const newImage = prompt("Edit image:",image);

fetch(`http://localhost:3000/equipment/update/${id}`,{

method:"PUT",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
equipment_name:newName,
image:newImage
})

})
.then(()=>loadEquipment());

}


/* DELETE EQUIPMENT */

function deleteEquipment(id){

if(!confirm("Delete this equipment?")) return;

fetch(`http://localhost:3000/equipment/delete/${id}`,{

method:"DELETE"

})
.then(()=>loadEquipment());

}


/* INITIAL LOAD */

loadEquipment();
if(localStorage.getItem("adminLoggedIn")!=="true"){
window.location.href="control-room-login.html";
}

</script>

</body>

</html>
